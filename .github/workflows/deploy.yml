# GitHub Actions Deploy Workflow
# Template per progetti Next.js + Payload CMS su fodivps2.cloud
#
# Secrets da configurare:
# - VPS_HOST: 72.61.184.133
# - VPS_USER: sviluppatore
# - SSH_PRIVATE_KEY: contenuto ~/.ssh/github_deploy

name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_SLUG: ecolive-website
  PROJECT_PATH: /var/www/projects/ecolive-website

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: PROJECT_PATH
          script: |
            cd $PROJECT_PATH

            # Pull latest changes
            git pull origin main

            # Build inside Docker with --network host (accesso DB via localhost:5445)
            source .env.docker.build 2>/dev/null || true
            docker build --network host --no-cache \
              --build-arg DATABASE_URL="postgresql://ecolive_user:Ecolive2026Secure@127.0.0.1:5445/ecolive_db" \
              --build-arg PAYLOAD_SECRET="$(grep PAYLOAD_SECRET .env.docker | cut -d= -f2)" \
              --build-arg NEXT_PUBLIC_SITE_URL="$(grep NEXT_PUBLIC_SITE_URL .env.docker | cut -d= -f2)" \
              --build-arg S3_ENDPOINT="http://127.0.0.1:9000" \
              --build-arg S3_ACCESS_KEY="$(grep S3_ACCESS_KEY .env.docker | cut -d= -f2)" \
              --build-arg S3_SECRET_KEY="$(grep S3_SECRET_KEY .env.docker | cut -d= -f2)" \
              --build-arg S3_BUCKET="$(grep S3_BUCKET .env.docker | cut -d= -f2)" \
              --build-arg S3_REGION="$(grep S3_REGION .env.docker | cut -d= -f2)" \
              --build-arg S3_PUBLIC_URL="$(grep S3_PUBLIC_URL .env.docker | cut -d= -f2)" \
              --build-arg N8N_WEBHOOK_URL="$(grep N8N_WEBHOOK_URL .env.docker | cut -d= -f2)" \
              -t ecolive-website-app .

            # Restart container
            docker compose up -d

            # Wait for container to be ready
            sleep 20

            # Health check
            CONTAINER_ID=$(docker compose ps -q app)
            if [ -n "$CONTAINER_ID" ]; then
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' "$CONTAINER_ID" 2>/dev/null || echo "unknown")
              echo "Container health: $HEALTH"
              if [ "$HEALTH" = "healthy" ] || [ "$HEALTH" = "starting" ]; then
                echo "Deploy successful"
              else
                echo "Warning: Container health is $HEALTH"
              fi
            fi

            # Docker cleanup
            docker image prune -f 2>/dev/null || true
            docker builder prune -f --filter "until=24h" 2>/dev/null || true

      - name: Notify deployment
        if: always()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: PROJECT_SLUG
          script: |
            curl -s -X POST "https://n8n.fodivps2.cloud/webhook/deploy-notify" \
              -H "Content-Type: application/json" \
              -d "{\"project\": \"$PROJECT_SLUG\", \"status\": \"${{ job.status }}\", \"commit\": \"${{ github.sha }}\", \"actor\": \"${{ github.actor }}\"}" \
              || echo "Notification webhook failed (non-critical)"
